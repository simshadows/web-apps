    <title>String Decoder/Encoder</title>

    <link rel="stylesheet" type="text/css" href="./index.css">

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="description" content="A simple string encoder/decoder.">
    <meta name="keywords" content="string, encoder, decoder">
    <meta name="author" content="simshadows">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://apps.simshadows.com/decoder-encoder/">
    <meta property="og:type" content="website">

<body>

<div>
    <label>Input:</label><br/>
    <textarea class="io" id="input">foobar</textarea>
</div>
<div>
    <p>
        <select id="fn-select">
            <option value="none">(No Function)</option>
            <option value="base64-decode">Base 64 (Decode)</option>
            <option value="base64-encode">Base 64 (Encode)</option>
            <option value="regex-literal-jsflavour-encode">Regex Safe Literal (JS Flavour) (Encode)</option>
            <!-- <option value="regex-literal-jsflavour-encode-modified">Regex Safe Literal (JS Flavour) (Encode) (Modified)</option> -->
            <option value="url-encode">URL/Percent (Encode)</option>
            <option value="url-decode">URL/Percent (Decode)</option>
            <option value="xml-entities-encode">XML/HTML Character Entities (Encode)</option>
            <option value="xml-entities-decode">XML/HTML Character Entities (Decode)</option>
            <option value="calc-string-length">Calculate: String Length</option>
            <option value="experimental-regex-escape-by-character">Experimental: RegExp.escape() by character</option>
            <!-- <option value="experimental-exception">Experimental: Debugging Exception</option> -->
        </select>
    </p>
    <button id="run-button" type="button" style="min-width: 5em;">Run</button>
</div>
<div><span id="arrow">&#x21E9;</span></div>
<div>
    <label>Output:</label><br/>
    <textarea class="io" id="output"></textarea>
</div>
