<html>
<head>
    <title>String Decoder/Encoder</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="./index.css">

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="description" content="A simple string encoder/decoder.">
    <meta name="keywords" content="string, encoder, decoder">
    <meta name="author" content="simshadows">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://apps.simshadows.com/decoder-encoder/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="String Decoder/Encoder">
    <meta property="og:description" content="A simple string encoder/decoder.">
    <!-- <meta property="og:image" content="https://apps.simshadows.com/ffxiv-mini-cactpot-solver/assets/mgp.png"> -->

    <!-- Twitter Meta Tags -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="String Decoder/Encoder">
    <meta property="twitter:description" content="A simple string encoder/decoder.">
    <!-- <meta property="twitter:image" content="https://apps.simshadows.com/ffxiv-mini-cactpot-solver/assets/mgp.png"> -->

    <!-- We don't include Google Analytics for security reasons -->
</head>

<body>

<div>
    <label>Input:</label><br/>
    <textarea class="io" id="input">foobar</textarea>
</div>
<div>
    <p>
        <select id="decode-select">
            <option value="none">(No Decoder)</option>
            <option value="base64">Decoder: Base 64</option>
            <option value="url">Decoder: URL/Percent</option>
            <option value="xml-entities">Decoder: XML/HTML Character Entities</option>
        </select>
    </p>
    <p>
        <select id="encode-select">
            <option value="none">(No Encoder)</option>
            <option value="base64">Encoder: Base 64</option>
            <option value="url">Encoder: URL/Percent</option>
            <option value="xml-entities">Encoder: XML/HTML Character Entities</option>
            <option value="calc-string-length">Calculate: String Length</option>
        </select>
    </p>
    <button id="run-button" type="button" style="min-width: 5em;">Run</button>
</div>
<div><span id="arrow">&#x21E9;</span></div>
<div>
    <label>Output:</label><br/>
    <textarea class="io" id="output"></textarea>
</div>

<script src="./index.js" type="module"></script>

</body>
</html>
